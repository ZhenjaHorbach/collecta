name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy edge functions'
        type: boolean
        default: true
      run_migrations:
        description: 'Run DB migrations'
        type: boolean
        default: true

concurrency:
  group: deploy-supabase
  cancel-in-progress: false  # never cancel an in-flight migration

jobs:
  deploy-supabase:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.run_migrations)
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.deploy_functions)
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
