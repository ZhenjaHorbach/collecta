name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npx eslint . --max-warnings 0
      - name: TypeScript strict check
        run: npx tsc --noEmit

  test:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test -- --ci --coverage --passWithNoTests

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Expo Doctor
        run: npx expo-doctor || true
      - name: EAS Build dry run (iOS)
        run: eas build --platform ios --non-interactive --dry-run
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Build dry run (Android)
        run: eas build --platform android --non-interactive --dry-run
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
